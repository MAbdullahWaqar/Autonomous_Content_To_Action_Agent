# Deploy backend/ to Railway on every push to main.
# Required GitHub secrets: RAILWAY_TOKEN, RAILWAY_SERVICE_ID
# See Readme or team docs for setup.

name: Deploy backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-railway.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # backboard.railway.com sometimes times out from GitHub runners — retry a few times
      - name: Deploy to Railway
        run: |
          set -e
          for attempt in 1 2 3 4; do
            echo "railway up attempt $attempt/4..."
            if railway up --service=${{ secrets.RAILWAY_SERVICE_ID }} --detach; then
              echo "Deploy started successfully."
              exit 0
            fi
            echo "Deploy failed (often network timeout). Waiting 60s before retry..."
            sleep 60
          done
          echo "All attempts failed."
          exit 1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
